openapi: 3.0.1
info:
  title: Response aware API
  version: 1.0.1
paths:
  /process-data:
    get:
      tags:
        - Getter
      parameters:
        - name: day
          in: query
          schema:
            enum:
              - Sunday
              - Monday
              - Tuesday
              - Wednesday
              - Thursday
              - Friday
              - Saturday
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  schemas:
    SuccessResponse:
      type: object
      properties:
        first_month:
          $ref: '#/components/schemas/Months'
        second_month:
          $ref: '#/components/schemas/Months'
        third_month:
          $ref: '#/components/schemas/MonthFull'
        complexObject:
          $ref: '#/components/schemas/ComplexAllOfSchema'
      description: A very useful data
    Months:
      type: array
      items:
        $ref: '#/components/schemas/Month'
    Month:
      title: Month of year
      enum:
        - JAN
        - FEB
        - MAR
        - APR
        - MAY
        - JUN
        - JUL
        - AUG
        - SEP
        - OCT
        - NOV
        - DEC
      type: string
    MonthFull:
      title: Month of year full
      enum:
        - January
        - February
        - March
        - April
        - May
        - June
        - July
        - August
        - September
        - October
        - November
        - December
      type: string
    ComplexAllOfSchema:
      allOf:
        - properties:
            year:
              $ref: '#/components/schemas/SomeYear'
            param1:
              type: string
        - properties:
            param2:
              type: string
    SomeYear:
      title: Some year
      enum:
        - "2021"
        - "2022"
        - "2023"
      type: string
    BadRequest:
      title: BadRequest
      type: object
      properties:
        error_code:
          type: integer
        error_text:
          type: string
    Unauthorized:
      title: Unauthorized
      type: object
      properties:
        error_code:
          type: integer
        error_text:
          type: string
    Forbidden:
      title: Forbidden
      type: object
      properties:
        error_code:
          type: integer
        error_text:
          type: string
  responses:
    BadRequest:
      description: 400 Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequest'
    Unauthorized:
      description: 401 Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Unauthorized'
    ServerError:
      description: 500 Internal server error
